name: Meatvo
description: "Meatvo - Fresh Raw Meat Delivery App built with Flutter"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.1+30

environment:
  sdk: ^3.9.2

# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0
  
  # Firebase Core & Messaging
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.4
  
  # State Management
  flutter_riverpod: ^2.5.0
  
  # Navigation & Routing
  go_router: ^13.0.0
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  crypto: ^3.0.3
  
  # Maps & Location
  google_maps_flutter: ^2.5.0  # Google Maps integration
  geolocator: ^11.0.0  # Basic location services
  geocoding: ^2.1.1  # Address geocoding
  widget_to_marker: ^1.0.6
  
  # Payments
  flutter_cashfree_pg_sdk: ^2.4.0+52
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Storage & Cache
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  
  # Image & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  
  # UI Components
  shimmer: ^3.0.0
  lottie: ^3.0.0
  carousel_slider: ^5.1.1
  
  # Connectivity
  connectivity_plus: ^7.1.1

  # Utils
  package_info_plus: ^8.3.0
  sms_autofill: ^2.4.1
  intl: ^0.19.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.2
  uuid: ^4.3.3
  
  # Real-time via backend Socket.IO
  socket_io_client: ^2.0.3+1
  web_socket_channel: ^2.4.0

  # Audio alerts (admin new-order notifications)
  audioplayers: ^6.1.0

  # Error Tracking
  sentry_flutter: ^9.22.0
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  mockito: ^5.4.4
  mocktail: ^1.0.1
  
  # Linting & Code Quality
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  
  # App Icon Generation
  flutter_launcher_icons: ^0.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/env.defaults
    - assets/env.local
    - assets/images/
    - assets/images/order_tracking/
    - assets/icons/
    - assets/animations/
    - assets/animations/order_confirmed.json
    - assets/animations/order_packing.json
    - assets/animations/order_delivered.json
    - assets/sounds/

  
# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21 # Android min sdk min:16, default 21
  adaptive_icon_background: "#E53935" # Meatvo brand red
  adaptive_icon_foreground: "assets/icons/logo.png"
  remove_alpha_ios: true # Remove alpha channel for iOS App Store compliance
