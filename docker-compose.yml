# Infra only:  docker compose up -d postgres redis
# Full stack:   docker compose --profile api up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: meatvo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-meatvo}
    ports:
      - "5432:5432"
    volumes:
      - meatvo_pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-meatvo}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: meatvo-redis
    ports:
      - "6379:6379"
    volumes:
      - meatvo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    profiles: ["api"]
    build:
      context: ./backend
    container_name: meatvo-api
    environment:
      PORT: "5000"
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      TRUST_PROXY: "true"

      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meatvo}
      REDIS_URL: redis://redis:6379
      DEFAULT_COUNTRY_CODE: "+91"

      # Auth / OTP — SECURITY FIX: no dev-default fallbacks; set in root .env
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OTP_HASH_SECRET: ${OTP_HASH_SECRET}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}

      # Dev-only auth bypass for Admin/Delivery HTML panels
      DEV_AUTH_BYPASS_ENABLED: ${DEV_AUTH_BYPASS_ENABLED:-false}
      DEV_AUTH_BYPASS_SECRET: ${DEV_AUTH_BYPASS_SECRET:-}

      # Allow opening the static HTML apps directly (file://) during local dev.
      CORS_ALLOW_NULL_ORIGIN: ${CORS_ALLOW_NULL_ORIGIN:-false}

      # Roles
      ADMIN_PHONES: ${ADMIN_PHONES:-}
      DELIVERY_PHONES: ${DELIVERY_PHONES:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:5000"

volumes:
  meatvo_pgdata:
  meatvo_redis:
