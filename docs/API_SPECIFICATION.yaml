        '401':
          $ref: '#/components/responses/UnauthorizedError'
    
    post:
      tags:
        - Orders
      summary: Create order
      description: |
        Places a new order from the user's cart. Clears cart on success.
        
        **Role:** Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /orders/my:
    get:
      tags:
        - Orders
      summary: Get my orders
      description: |
        Returns orders for the current user (alias for /orders).
        
        **Roles:** Customer, Delivery Partner
      responses:
        '200':
          description: Orders retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'

  /orders/apply-coupon:
    post:
      tags:
        - Orders
      summary: Apply coupon
      description: |
        Validates a coupon code and returns the discount amount.
        
        **Role:** Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - orderTotal
              properties:
                code:
                  type: string
                  minLength: 2
                  maxLength: 40
                  description: Coupon code
                orderTotal:
                  type: number
                  minimum: 0
                  description: Order subtotal before discount
      responses:
        '200':
          description: Coupon applied successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          discount:
                            type: number
                            description: Discount amount
                          finalTotal:
                            type: number
                            description: Order total after discount
        '400':
          description: Invalid coupon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                ok: false
                error:
                  message: "Invalid or expired coupon"
                  code: "INVALID_COUPON"
                message: "Invalid or expired coupon"

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
