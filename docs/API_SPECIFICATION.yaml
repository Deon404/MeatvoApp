                      data:
                        $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /orders/{id}/cancel:
    put:
      tags:
        - Orders
      summary: Cancel order
      description: |
        Cancels an order. Only allowed for orders in PLACED or CONFIRMED status.
        
        **Role:** Customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Order cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                ok: false
                error:
                  message: "Order cannot be cancelled at this stage"
                  code: "ORDER_NOT_CANCELLABLE"
                message: "Order cannot be cancelled at this stage"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /orders/{id}/status:
    put:
      tags:
        - Orders
      summary: Update order status
      description: |
        Updates the order status. Admin only.
        
        **Role:** Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
