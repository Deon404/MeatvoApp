openapi: 3.0.3
info:
  title: Meatvo API
  description: |
    **Enterprise-grade REST API for Meatvo - Hyperlocal Raw Meat Delivery Platform**
    
    ## Overview
    Meatvo provides a comprehensive API for managing a hyperlocal raw meat delivery service.
    The platform supports three user roles: Customers, Delivery Partners, and Admins.
    
    ## Base URL
    - Development: `http://localhost:8080/api`
    - Production: `https://api.meatvo.com/api`
    
    ## Authentication
    Most endpoints require JWT authentication via Bearer token in the Authorization header.
    Obtain tokens through the OTP-based authentication flow.
    
    ## Rate Limiting
    - **API General**: 300 requests per 15 minutes per IP
    - **Auth Routes**: 60 requests per 15 minutes per IP
    - **OTP Requests**: 10 requests per 10 minutes per phone number
    - **Payment Initiation**: 10 requests per minute per user
    - **Admin Routes**: 100 requests per 15 minutes per IP
    - **Token Refresh**: 10 requests per minute per IP
    
    ## Standard Response Format
    
    ### Success Response (2xx)
    ```json
    {
      "success": true,
      "ok": true,
      "data": {},
      "message": "Success message"
    }
    ```
    
    ### Error Response (4xx/5xx)
    ```json
    {
      "success": false,
      "ok": false,
      "error": {
        "message": "Error description",
        "code": "ERROR_CODE"
      },
      "data": {},
      "message": "Error description"
    }
    ```
    
    ## Error Codes
    - `VALIDATION_ERROR` - Request validation failed
    - `UNAUTHORIZED` - Authentication required or invalid token
    - `FORBIDDEN` - Insufficient permissions
    - `NOT_FOUND` - Resource not found
    - `RATE_LIMITED` - Too many requests
    - `OTP_EXPIRED` - OTP has expired
    - `OTP_INVALID` - OTP verification failed
    - `PHONE_BLOCKED` - Too many failed OTP attempts
    - `PAYMENT_FAILED` - Payment processing failed
    - `ORDER_NOT_CANCELLABLE` - Order cannot be cancelled
    - `INSUFFICIENT_STOCK` - Product out of stock
    - `INVALID_COUPON` - Coupon code is invalid or expired
    - `SERVER_ERROR` - Internal server error
    
  version: 1.0.0
  contact:
    name: Meatvo API Support
    email: api@meatvo.com
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080/api
    description: Development server
  - url: https://api.meatvo.com/api
    description: Production server

tags:
  - name: Authentication
    description: OTP-based authentication, JWT token management, and MFA
  - name: Users
    description: User profile and FCM token management
  - name: Addresses
    description: Customer delivery address management
  - name: Products
    description: Product catalog browsing and management
  - name: Categories
    description: Product category operations
  - name: Cart
    description: Shopping cart operations (Redis-backed)
  - name: Orders
    description: Order placement, tracking, and management
  - name: Payments
    description: PhonePe payment integration
  - name: Delivery
    description: Delivery partner operations and slot management
  - name: Coupons
    description: Discount coupon management
  - name: Banners
    description: Promotional banner management
  - name: Settings
    description: Store settings and configuration
  - name: Admin
    description: Administrative operations
  - name: Health
    description: Health check and monitoring endpoints

security:
  - bearerAuth: []

paths:
  # ==================== AUTHENTICATION ====================
  /auth/send-otp:
    post:
      tags:
        - Authentication
      summary: Send OTP to phone number
      description: |
        Sends a 4-digit OTP via SMS (MSG91) to the provided phone number.
        Creates a new user account if phone number doesn't exist.
        
        **Rate Limits:**
        - 10 OTP requests per 10 minutes per phone
        - 100 requests per 15 minutes per IP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  description: Phone number in E.164 format (e.g., +919999999999)
                  pattern: '^\+[1-9]\d{1,14}$'
                  example: "+919876543210"
                resend:
                  type: boolean
                  description: Set to true if resending OTP
                  default: false
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                ok: true
                data:
                  phone: "+919876543210"
                  expiresIn: 600
                message: "OTP sent successfully"
        '429':
          $ref: '#/components/responses/RateLimitError'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/verify-otp:
    post:
      tags:
        - Authentication
      summary: Verify OTP and get JWT tokens
      description: |
        Verifies the OTP and returns JWT access and refresh tokens.
        Also supports MFA verification if enabled for the user.
        
        **Rate Limits:**
        - Max 3 OTP verification attempts before phone is temporarily blocked
        - 100 requests per 15 minutes per IP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - otp
              properties:
                phone:
                  type: string
                  pattern: '^\+[1-9]\d{1,14}$'
                  example: "+919876543210"
                otp:
                  type: string
                  pattern: '^\d{4}$'
                  description: 4-digit OTP code
                  example: "1234"
                mfaToken:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit MFA token (required if MFA is enabled)
                  example: "123456"
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                            description: JWT access token (expires in 1 hour)
                          refreshToken:
                            type: string
                            description: JWT refresh token (expires in 30 days)
                          user:
                            $ref: '#/components/schemas/User'
        '401':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidOtp:
                  value:
                    success: false
                    ok: false
                    error:
                      message: "Invalid OTP"
                      code: "OTP_INVALID"
                    message: "Invalid OTP"
                expiredOtp:
                  value:
                    success: false
                    ok: false
                    error:
                      message: "OTP expired"
                      code: "OTP_EXPIRED"
                    message: "OTP expired"
                phoneBlocked:
                  value:
                    success: false
                    ok: false
                    error:
                      message: "Too many failed attempts. Phone blocked temporarily"
                      code: "PHONE_BLOCKED"
                    message: "Too many failed attempts. Phone blocked temporarily"
        '429':
          $ref: '#/components/responses/RateLimitError'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token.
        
        **Rate Limit:** 10 requests per minute per IP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: JWT refresh token obtained from /auth/verify-otp
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user info
      description: Returns the authenticated user's profile information
      responses:
        '200':
          description: User info retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidates the current refresh token
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/mfa/setup:
    post:
      tags:
        - Authentication
      summary: Setup MFA (Multi-Factor Authentication)
      description: |
        Generates a new MFA secret and returns QR code data for authenticator apps.
        User must verify with a token before MFA is enabled.
      responses:
        '200':
          description: MFA setup initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          secret:
                            type: string
                            description: Base32-encoded MFA secret
                          qrCode:
                            type: string
                            description: Data URL for QR code
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/mfa/enable:
    post:
      tags:
        - Authentication
      summary: Enable MFA
      description: Enables MFA for the user after verifying a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - secret
                - token
              properties:
                secret:
                  type: string
                  minLength: 32
                  description: MFA secret from /auth/mfa/setup
                token:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit token from authenticator app
      responses:
        '200':
          description: MFA enabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/mfa/disable:
    post:
      tags:
        - Authentication
      summary: Disable MFA
      description: Disables MFA for the user after verifying a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit token from authenticator app
      responses:
        '200':
          description: MFA disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ==================== USERS ====================
  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: Returns the authenticated user's profile
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          phone:
                            type: string
                          role:
                            type: string
                            enum: [customer, delivery, admin]
                          name:
                            type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/fcm-token:
    post:
      tags:
        - Users
      summary: Update FCM token
      description: Updates the Firebase Cloud Messaging token for push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fcm_token
              properties:
                fcm_token:
                  type: string
                  description: Firebase Cloud Messaging device token
      responses:
        '200':
          description: FCM token saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ==================== ADDRESSES ====================
  /addresses:
    get:
      tags:
        - Addresses
      summary: List user addresses
      description: |
        Returns all delivery addresses for the authenticated user.
        
        **Roles:** Customer, Delivery Partner
      responses:
        '200':
          description: Addresses retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    
    post:
      tags:
        - Addresses
      summary: Add new address
      description: |
        Creates a new delivery address for the user.
        
        **Roles:** Customer, Delivery Partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressInput'
      responses:
        '201':
          description: Address created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /addresses/{id}:
    patch:
      tags:
        - Addresses
      summary: Update address
      description: |
        Updates an existing address. Only the owner can update their address.
        
        **Roles:** Customer, Delivery Partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Address ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressUpdateInput'
      responses:
        '200':
          description: Address updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    
    delete:
      tags:
        - Addresses
      summary: Delete address
      description: |
        Deletes an address. Only the owner can delete their address.
        
        **Roles:** Customer, Delivery Partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Address ID
      responses:
        '200':
          description: Address deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /addresses/{id}/default:
    patch:
      tags:
        - Addresses
      summary: Set default address
      description: |
        Sets an address as the default delivery address.
        
        **Roles:** Customer, Delivery Partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Address ID
      responses:
        '200':
          description: Default address updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ==================== PRODUCTS ====================
  /products:
    get:
      tags:
        - Products
      summary: List products
      description: |
        Returns a paginated list of products with optional filtering.
        Public endpoint (no authentication required).
      security: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - name: categoryId
          in: query
          schema:
            type: integer
          description: Filter by category ID
        - name: min_price
          in: query
          schema:
            type: number
            minimum: 0
          description: Minimum price filter
        - name: max_price
          in: query
          schema:
            type: number
            minimum: 0
          description: Maximum price filter
        - name: q
          in: query
          schema:
            type: string
          description: Search query
        - name: includeInactive
          in: query
          schema:
            type: boolean
          description: Include inactive products (admin only)
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          products:
                            type: array
                            items:
                              $ref: '#/components/schemas/Product'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/ValidationError'
    
    post:
      tags:
        - Products
      summary: Create product
      description: |
        Creates a new product. Admin only.
        
        **Role:** Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Returns detailed information about a specific product
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFoundError'
    
    put:
      tags:
        - Products
      summary: Update product
      description: |
        Updates an existing product. Admin only.
        
        **Role:** Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateInput'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    
    delete:
      tags:
        - Products
      summary: Delete product
      description: |
        Deletes a product. Admin only.
        
        **Role:** Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      responses:
        '200':
          description: Product deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /products/featured:
    get:
      tags:
        - Products
      summary: Get featured products
      description: Returns a list of featured products
      security: []
      responses:
        '200':
          description: Featured products retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Product'

  /products/search:
    get:
      tags:
        - Products
      summary: Search products
      description: Full-text search across product names and descriptions
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 100
          description: Search query
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Product'

  # ==================== CATEGORIES ====================
  /categories:
    get:
      tags:
        - Categories
      summary: List categories
      description: Returns all product categories
      security: []
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
    
    post:
      tags:
        - Categories
      summary: Create category
      description: |
        Creates a new category. Admin only.
        
        **Role:** Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /categories/{id}:
    put:
      tags:
        - Categories
      summary: Update category
      description: |
        Updates an existing category. Admin only.
        
        **Role:** Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Category ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateInput'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    
    delete:
      tags:
        - Categories
      summary: Delete category
      description: |
        Deletes a category. Admin only.
        
        **Role:** Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Category ID
      responses:
        '200':
          description: Category deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ==================== CART ====================
  /cart:
    get:
      tags:
        - Cart
      summary: Get cart
      description: |
        Returns the user's shopping cart (Redis-backed).
        
        **Role:** Customer
      responses:
        '200':
          description: Cart retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
