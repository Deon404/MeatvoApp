  # ==================== HEALTH ====================
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Basic health check endpoint
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  service:
                    type: string
                    example: "meatvo-backend"
                  health:
                    type: string
                    example: "/health"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/verify-otp

  schemas:
    # ==================== BASE SCHEMAS ====================
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        ok:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        ok:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
        data:
          type: object
        message:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    # ==================== USER SCHEMAS ====================
    User:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
          pattern: '^\+[1-9]\d{1,14}$'
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [customer, delivery, admin]
        createdAt:
          type: string
          format: date-time
        mfaEnabled:
          type: boolean
          description: Whether MFA is enabled

    # ==================== ADDRESS SCHEMAS ====================
    Address:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        label:
          type: string
          enum: [home, work, other]
        addressLine1:
          type: string
        addressLine2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        landmark:
          type: string
          nullable: true
        lat:
          type: number
        lng:
          type: number
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AddressInput:
      type: object
      required:
        - addressLine1
      properties:
        label:
          type: string
          enum: [home, work, other]
          default: home
        addressLine1:
          type: string
          minLength: 5
          maxLength: 300
        addressLine2:
          type: string
          maxLength: 300
          nullable: true
        city:
          type: string
          maxLength: 100
          default: "Dhanbad"
        state:
          type: string
          maxLength: 100
          default: "Jharkhand"
        pincode:
          type: string
          maxLength: 10
        landmark:
          type: string
          maxLength: 120
          nullable: true
        lat:
          type: number
          description: Latitude
        lng:
          type: number
          description: Longitude
        isDefault:
          type: boolean
          default: false

    AddressUpdateInput:
      type: object
      properties:
        label:
          type: string
          enum: [home, work, other]
        addressLine1:
          type: string
          minLength: 5
          maxLength: 300
        addressLine2:
          type: string
          maxLength: 300
          nullable: true
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        pincode:
          type: string
          maxLength: 10
        landmark:
          type: string
          maxLength: 120
          nullable: true
        lat:
          type: number
        lng:
          type: number
        isDefault:
          type: boolean

    # ==================== PRODUCT SCHEMAS ====================
    Product:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        mrp:
          type: number
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        stock:
          type: integer
        unit:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required:
        - name
        - price
      properties:
        category_id:
          type: integer
          nullable: true
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        price:
          type: number
          minimum: 0
          maximum: 10000
        mrp:
          type: number
          minimum: 0
          nullable: true
        image_url:
          type: string
          format: uri
          nullable: true
        stock:
          type: integer
          minimum: 0
          default: 0
        unit:
          type: string
          maxLength: 20
          nullable: true
        active:
          type: boolean
          default: true

    ProductUpdateInput:
      type: object
      properties:
        category_id:
          type: integer
          nullable: true
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        price:
          type: number
          minimum: 0
          maximum: 10000
        mrp:
          type: number
          minimum: 0
          nullable: true
        image_url:
          type: string
          format: uri
          nullable: true
        stock:
          type: integer
          minimum: 0
        unit:
          type: string
          maxLength: 20
          nullable: true
        active:
          type: boolean

    # ==================== CATEGORY SCHEMAS ====================
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        active:
          type: boolean
          default: true

    CategoryUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        active:
          type: boolean

    # ==================== CART SCHEMAS ====================
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer
              product:
                $ref: '#/components/schemas/Product'
        total:
          type: number
        itemCount:
          type: integer

    # ==================== ORDER SCHEMAS ====================
    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum:
            - PLACED
            - CONFIRMED
            - PACKED
            - OUT_FOR_DELIVERY
            - DELIVERED
            - CANCELLED
        paymentMethod:
          type: string
          enum: [COD, ONLINE]
        paymentStatus:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
        total:
          type: number
        deliveryAddress:
          type: string
        deliverySlot:
          type: object
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              name:
                type: string
              quantity:
                type: integer
              price:
                type: number
        createdAt:
          type: string
          format: date-time
        deliveryPartnerId:
          type: integer
          nullable: true

    OrderInput:
      type: object
      required:
        - deliveryAddress
        - paymentMethod
      properties:
        deliveryAddress:
          type: string
          minLength: 10
          maxLength: 500
        paymentMethod:
          type: string
          enum: [COD, ONLINE]
        lat:
          type: number
          description: Delivery latitude
        lng:
          type: number
          description: Delivery longitude
        addressId:
          type: integer
          description: Address ID from saved addresses
        deliverySlotId:
          type: integer
          description: Delivery slot ID
        deliverySlot:
          type: object
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 40
            date:
              type: string
              minLength: 8
              maxLength: 20
            time:
              type: string
              minLength: 3
              maxLength: 40
        couponCode:
          type: string
          minLength: 2
          maxLength: 40

    # ==================== DELIVERY SCHEMAS ====================
    DeliveryPartner:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
          nullable: true
        phone:
          type: string
        vehicle:
          type: string
          nullable: true
        vehicleNumber:
          type: string
          nullable: true
        licenceNumber:
          type: string
          nullable: true
        isOnline:
          type: boolean
        currentLat:
          type: number
          nullable: true
        currentLng:
          type: number
          nullable: true
        totalDeliveries:
          type: integer
        totalEarnings:
          type: number
        rating:
          type: number
          nullable: true

    DeliverySlot:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        capacity:
          type: integer
        booked:
          type: integer
        available:
          type: boolean

    # ==================== COUPON SCHEMAS ====================
    Coupon:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        discountType:
          type: string
          enum: [PERCENTAGE, FIXED]
        discountValue:
          type: number
        minOrderAmount:
          type: number
          nullable: true
        maxDiscount:
          type: number
          nullable: true
        validFrom:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
        usageLimit:
          type: integer
          nullable: true
        usedCount:
          type: integer
        active:
          type: boolean

    CouponInput:
      type: object
      required:
        - code
        - discountType
        - discountValue
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 40
        discountType:
          type: string
          enum: [PERCENTAGE, FIXED]
        discountValue:
          type: number
          minimum: 0
        minOrderAmount:
          type: number
          minimum: 0
          nullable: true
        maxDiscount:
          type: number
          minimum: 0
          nullable: true
        validFrom:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
        usageLimit:
          type: integer
          minimum: 1
          nullable: true
        active:
          type: boolean
          default: true

    # ==================== BANNER SCHEMAS ====================
    Banner:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        imageUrl:
          type: string
          format: uri
        linkUrl:
          type: string
          format: uri
          nullable: true
        position:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    BannerInput:
      type: object
      required:
        - title
        - imageUrl
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 100
        imageUrl:
          type: string
          format: uri
        linkUrl:
          type: string
          format: uri
          nullable: true
        position:
          type: integer
          minimum: 0
        active:
          type: boolean
          default: true

  responses:
    # ==================== ERROR RESPONSES ====================
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            ok: false
            error:
              message: "Validation failed"
              code: "VALIDATION_ERROR"
            data:
              issues:
                - field: "phone"
                  message: "Phone must be E.164 format"
            message: "Validation failed"

    UnauthorizedError:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            ok: false
            error:
              message: "Unauthorized"
              code: "UNAUTHORIZED"
            message: "Unauthorized"

    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            ok: false
            error:
              message: "Forbidden"
              code: "FORBIDDEN"
            message: "Forbidden"

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            ok: false
            error:
              message: "Not found"
              code: "NOT_FOUND"
            message: "Not found"

    RateLimitError:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            ok: false
            error:
              message: "Too many requests. Try again later."
              code: "RATE_LIMITED"
            message: "Too many requests. Try again later."

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            ok: false
            error:
              message: "Internal server error"
              code: "SERVER_ERROR"
            message: "Internal server error"
