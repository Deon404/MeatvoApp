                    - DELIVERED
                    - CANCELLED
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ==================== PAYMENTS ====================
  /payments/initiate:
    post:
      tags:
        - Payments
      summary: Initiate payment
      description: |
        Initiates a PhonePe payment for an order.
        Returns a payment URL to redirect the user to.
        
        **Rate Limit:** 10 requests per minute per user
        
        **Role:** Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
              properties:
                orderId:
                  type: integer
                  minimum: 1
                  description: Order ID to pay for
      responses:
        '200':
          description: Payment initiated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          paymentUrl:
                            type: string
                            format: uri
                            description: PhonePe payment page URL
                          merchantTransactionId:
                            type: string
                            description: Unique transaction ID
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /payments/verify:
    post:
      tags:
        - Payments
      summary: Verify payment
      description: |
        Verifies a PhonePe payment status.
        
        **Rate Limit:** 10 requests per minute per user
        
        **Role:** Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                  description: PhonePe transaction ID
                merchantTransactionId:
                  type: string
                  description: Merchant transaction ID
              oneOf:
                - required: [transactionId]
                - required: [merchantTransactionId]
      responses:
        '200':
          description: Payment verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [SUCCESS, FAILED, PENDING]
                          amount:
                            type: number
                          transactionId:
                            type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /payments/{orderId}/status:
    get:
      tags:
        - Payments
      summary: Get payment status
      description: |
        Returns the payment status for an order.
        
        **Role:** Customer
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      responses:
        '200':
          description: Payment status retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [PENDING, SUCCESS, FAILED]
                          paymentMethod:
                            type: string
                            enum: [COD, ONLINE]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /payments/webhook:
    post:
      tags:
        - Payments
      summary: PhonePe webhook
      description: |
        PhonePe payment gateway webhook endpoint.
        Handles payment status updates from PhonePe.
        
        **Rate Limit:** 10 requests per minute per IP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: PhonePe webhook payload (signature verified)
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid webhook payload
        '429':
          $ref: '#/components/responses/RateLimitError'

