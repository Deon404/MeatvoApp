apiVersion: v1
kind: Service
metadata:
  name: meatvo-backend-service
  namespace: production
  labels:
    app: meatvo-backend
    environment: production
spec:
  selector:
    app: meatvo-backend
    environment: production
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: meatvo-frontend-service
  namespace: production
  labels:
    app: meatvo-frontend
    environment: production
spec:
  selector:
    app: meatvo-frontend
    environment: production
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
