apiVersion: apps/v1
kind: Deployment
metadata:
  name: meatvo-backend
  namespace: staging
  labels:
    app: meatvo-backend
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meatvo-backend
      environment: staging
  template:
    metadata:
      labels:
        app: meatvo-backend
        environment: staging
    spec:
      containers:
      - name: meatvo-backend
        image: ghcr.io/meatvo/meatvo/backend:${IMAGE_TAG:-latest}
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: NODE_ENV
          value: "staging"
        - name: PORT
          value: "5000"
        - name: LOG_LEVEL
          value: "info"
        - name: TRUST_PROXY
          value: "true"
        # Database configuration (from secrets)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: redis-url
        # JWT secrets
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: jwt-access-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: jwt-refresh-secret
        - name: OTP_HASH_SECRET
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: otp-hash-secret
        # External services
        - name: MSG91_AUTH_KEY
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: msg91-api-key
        - name: MSG91_TEMPLATE_ID
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: msg91-template-id
        - name: MSG91_SENDER_ID
          value: MEATVO
        - name: PHONEPE_MERCHANT_ID
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: phonepe-merchant-id
        - name: PHONEPE_SALT_KEY
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: phonepe-salt-key
        - name: GOOGLE_MAPS_API_KEY
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: google-maps-api-key
        # Firebase
        - name: FIREBASE_API_KEY
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: firebase-api-key
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: firebase-project-id
        - name: FIREBASE_MESSAGING_SENDER_ID
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: firebase-messaging-sender-id
        - name: FIREBASE_APP_ID
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: firebase-app-id
        - name: FCM_SERVER_KEY
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: fcm-server-key
        # Monitoring
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: meatvo-secrets
              key: sentry-dsn
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch:9200"
        # CORS
        - name: CORS_ORIGINS
          value: "https://staging.meatvo.com,https://api-staging.meatvo.com"
        - name: CORS_ALLOW_NULL_ORIGIN
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /var/log/meatvo
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: logs
        emptyDir: {}
      - name: uploads
        persistentVolumeClaim:
          claimName: meatvo-uploads-pvc
      imagePullSecrets:
      - name: ghcr-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meatvo-frontend
  namespace: staging
  labels:
    app: meatvo-frontend
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meatvo-frontend
      environment: staging
  template:
    metadata:
      labels:
        app: meatvo-frontend
        environment: staging
    spec:
      containers:
      - name: meatvo-frontend
        image: ghcr.io/meatvo/meatvo/frontend:${IMAGE_TAG:-latest}
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      imagePullSecrets:
      - name: ghcr-secret
