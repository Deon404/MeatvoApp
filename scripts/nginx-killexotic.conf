# Meatvo / KillExotic production Nginx config
# Install: cp scripts/nginx-meatvo.conf /etc/nginx/sites-available/meatvo
#          ln -sf /etc/nginx/sites-available/meatvo /etc/nginx/sites-enabled/meatvo
#          nginx -t && systemctl reload nginx
#
# Replace YOUR_DOMAIN with your production domain before use.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

upstream meatvo_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP — ACME + redirect to HTTPS (disable redirect during initial cert issue)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN api.YOUR_DOMAIN;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN api.YOUR_DOMAIN;

    # Certbot-managed paths (adjust after cert issue)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MeatvoSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=()" always;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static uploads served by backend; cache at edge
    location /uploads/ {
        proxy_pass http://meatvo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/auth/(send-otp|verify-otp) {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://meatvo_backend;
        include /etc/nginx/snippets/meatvo-proxy.conf;
    }

    # WebSocket (Socket.io on /ws)
    location /ws {
        proxy_pass http://meatvo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # API
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://meatvo_backend;
        include /etc/nginx/snippets/meatvo-proxy.conf;
    }

    # Health (restrict to localhost / monitoring IPs in production)
    location /health {
        allow 127.0.0.1;
        allow ::1;
        # allow MONITORING_IP;
        deny all;
        proxy_pass http://meatvo_backend;
        include /etc/nginx/snippets/meatvo-proxy.conf;
    }

    location /metrics {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://meatvo_backend;
        include /etc/nginx/snippets/meatvo-proxy.conf;
    }

    # Default — SPA + backend
    location / {
        proxy_pass http://meatvo_backend;
        include /etc/nginx/snippets/meatvo-proxy.conf;
    }
}

