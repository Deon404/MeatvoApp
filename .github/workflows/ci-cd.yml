name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: meatvo

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # Code Quality and Testing
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: meatvo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run CI smoke tests
        working-directory: ./backend
        run: npm run test:ci
        env:
          NODE_ENV: test
          PORT: 8080
          HOST: 127.0.0.1
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/meatvo_test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: meatvo_test
          DB_USER: testuser
          DB_PASSWORD: testpassword
          REDIS_URL: redis://localhost:6379
          SMS_PROVIDER: console
          CASHFREE_ENV: sandbox
          CASHFREE_API_BASE: https://sandbox.cashfree.com/pg
          JWT_ACCESS_SECRET: ci_jwt_access_secret_0123456789abcdef0123456789ab
          JWT_REFRESH_SECRET: ci_jwt_refresh_secret_0123456789abcdef0123456789a
          OTP_HASH_SECRET: ci_otp_hash_secret_0123456789abcdef0123456789abcdef
          REDIS_ENCRYPTION_KEY: ci_redis_encryption_key_0123456789abcdef

  # Security Scanning
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run npm audit
        working-directory: ./backend
        run: npm audit --audit-level=high

  # Build Docker Images
  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    outputs:
      backend-image: ${{ steps.backend-build.outputs.image }}
      frontend-image: ${{ steps.frontend-build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        id: backend-build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata for frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        id: frontend-build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Deploy to Staging
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to staging
        run: |
          # Update kubeconfig
          aws eks update-kubeconfig --name meatvo-staging
          
          # Deploy application
          envsubst < k8s/staging/deployment.yml | kubectl apply -f -
          envsubst < k8s/staging/service.yml | kubectl apply -f -
          envsubst < k8s/staging/ingress.yml | kubectl apply -f -
          
          # Wait for deployment
          kubectl rollout status deployment/meatvo-backend -n staging
          kubectl rollout status deployment/meatvo-frontend -n staging
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}

      - name: Run integration tests
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=meatvo-backend -n staging --timeout=300s
          
          # Run health checks
          kubectl port-forward svc/meatvo-backend 8080:80 -n staging &
          sleep 10
          
          curl -f http://localhost:8080/health || exit 1

  # Deploy to Production
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to production
        run: |
          # Update kubeconfig
          aws eks update-kubeconfig --name meatvo-production
          
          # Deploy application with zero downtime
          kubectl apply -f k8s/production/
          
          # Wait for deployment
          kubectl rollout status deployment/meatvo-backend -n production
          kubectl rollout status deployment/meatvo-frontend -n production
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}

      - name: Run production health checks
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=meatvo-backend -n production --timeout=300s
          
          # Run comprehensive health checks
          kubectl port-forward svc/meatvo-backend 8080:80 -n production &
          sleep 10
          
          # Health check
          curl -f http://localhost:8080/health || exit 1
          
          # Database connectivity check
          curl -f http://localhost:8080/health/db || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # Database Backup
  backup-database:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run database backup
        run: |
          chmod +x scripts/backup/postgres-backup.sh
          ./scripts/backup/postgres-backup.sh production
