input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json
  }
  
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse JSON logs from the application
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
    
    # If parsing succeeded, use parsed fields
    if ![parsed][timestamp] {
      # If JSON parsing failed, treat as plain text
      mutate {
        add_field => { "log_type" => "plain_text" }
      }
    } else {
      # Move parsed fields to root level
      mutate {
        rename => {
          "[parsed][level]" => "level"
          "[parsed][message]" => "log_message"
          "[parsed][timestamp]" => "log_timestamp"
          "[parsed][service]" => "service"
          "[parsed][request_id]" => "request_id"
          "[parsed][user_id]" => "user_id"
          "[parsed][ip]" => "client_ip"
          "[parsed][user_agent]" => "user_agent"
          "[parsed][method]" => "http_method"
          "[parsed][url]" => "request_url"
          "[parsed][status_code]" => "status_code"
          "[parsed][response_time]" => "response_time"
          "[parsed][error]" => "error"
        }
      }
    }
  }

  # Add timestamp if not present
  if ![log_timestamp] {
    mutate {
      add_field => { "log_timestamp" => "%{@timestamp}" }
    }
  }

  # Parse log_timestamp
  date {
    match => [ "log_timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # Add environment information
  mutate {
    add_field => { 
      "environment" => "%{[fields][environment]}" 
      "application" => "meatvo"
    }
  }

  # Categorize logs
  if [level] == "error" or [level] == "fatal" {
    mutate {
      add_field => { "log_category" => "error" }
    }
  } else if [level] == "warn" {
    mutate {
      add_field => { "log_category" => "warning" }
    }
  } else if [http_method] {
    mutate {
      add_field => { "log_category" => "access" }
    }
  } else {
    mutate {
      add_field => { "log_category" => "application" }
    }
  }

  # Extract geo information from IP if available
  if [client_ip] and [client_ip] != "-" {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Parse user agent if available
  if [user_agent] and [user_agent] != "-" {
    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }
  }

  # Clean up fields
  mutate {
    remove_field => [ "message", "parsed", "host", "agent", "ecs", "input", "log" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "meatvo-logs-%{+YYYY.MM.dd}"
    template_name => "meatvo"
    template_pattern => "meatvo-*"
    template => {
      "index_patterns" => ["meatvo-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0,
        "index.refresh_interval" => "5s"
      },
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" },
          "level" => { "type" => "keyword" },
          "log_message" => { "type" => "text" },
          "service" => { "type" => "keyword" },
          "request_id" => { "type" => "keyword" },
          "user_id" => { "type" => "keyword" },
          "client_ip" => { "type" => "ip" },
          "http_method" => { "type" => "keyword" },
          "request_url" => { "type" => "text" },
          "status_code" => { "type" => "integer" },
          "response_time" => { "type" => "float" },
          "error" => { "type" => "text" },
          "log_category" => { "type" => "keyword" },
          "environment" => { "type" => "keyword" },
          "geoip" => {
            "properties" => {
              "location" => { "type" => "geo_point" },
              "country_name" => { "type" => "keyword" },
              "city_name" => { "type" => "keyword" }
            }
          },
          "user_agent_parsed" => {
            "properties" => {
              "name" => { "type" => "keyword" },
              "os" => { "type" => "keyword" },
              "device" => { "type" => "keyword" }
            }
          }
        }
      }
    }
  }

  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}
